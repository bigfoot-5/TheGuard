global:
  default_model: "gpt-4o-mini"
  default_temperature: 0.2

tasks:
  deal_copy:
    model: "gpt-4o-mini"
    dataset: "eval_pipeline/data/deal_copy_cases.json"
    prompt_file: "eval_pipeline/prompts/system_assistant_389c7a3e.txt"
    input_template: "Write deal copy for: {raw_deal_extraction} at {merchant_name}. Target Channel: {target_channel}, character limit is {expected_max_length}"
