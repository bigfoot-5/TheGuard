global:
  default_model: "gpt-4o-mini"
  default_temperature: 0.2

tasks:
  deal_copy:
    dataset: "eval_pipeline/data/deal_copy_cases.json"
    prompt_file: "eval_pipeline/prompts/system_assistant_389c7a3e.txt"
    input_template: "Write deal copy for: {raw_deal_extraction} at {merchant_name}. Target Channel: {target_channel}."
    metrics:
      - name: "Format Compliance"
        registry_key: "format_compliance"
        type: "continuous"
      - name: "Semantic Similarity"
        registry_key: "semantic_similarity"
        type: "continuous"

  insurance_intent:
    dataset: "eval_pipeline/data/insurance_intent_cases.json"
    prompt_file: "eval_pipeline/prompts/system_insurance_classifier_b5a8b780.txt"
    temperature: 0.1 # Override default
    input_template: "Cart contents: {cart_contents}. Device: {user_device_type}. History: {historical_purchase_flags}."
    metrics:
      - name: "Intent Accuracy"
        registry_key: "intent_accuracy"
        type: "binary"