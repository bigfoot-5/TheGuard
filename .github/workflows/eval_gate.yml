name: "Production Evaluation Gate: GrabOn AI Labs"
on:  
  pull_request:    
    paths:      
      - 'prompts/**'      
      - 'models/**'      
      - 'tools/**'      
      - 'eval_pipeline/**'
jobs:  
  run_eval_pipeline:    
    name: Execute Statistical Eval Harness    
    runs-on: ubuntu-latest    
    permissions:      
      contents: write     
      pull-requests: write # Required to post the evaluation report comment          
    steps:      
      - name: Checkout Repository        
        uses: actions/checkout@v4        
        with:          
          fetch-depth: 0 # Required to generate git diffs against the base branch      
          token: ${{ secrets.GH_PAT }}
          
      - name: Set up Python 3.10 Environment        
        uses: actions/setup-python@v5        
        with:          
          python-version: '3.10'          
          cache: 'pip'      
          
      - name: Install Dependencies  
        run: |          
          python -m pip install --upgrade pip          
          pip install -r eval_pipeline/requirements.txt # Installs scipy, statsmodels, pytest, etc.      
          
      - name: Execute Evaluation and Statistical Engine        
        id: run_evals        
        env:          
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}          
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}       
        run: |
          # The script runs the 3 tasks, 5 scoring functions, McNemar/Bootstrap tests,           
          # and determines the GO/NO-GO/INCONCLUSIVE state.
          # It generates a 'regression_report.md' file summarizing the findings.          
          python eval_pipeline/run_evals.py --base-ref origin/${{ github.base_ref }}                
          
      - name: Post Evaluation Report to PR        
        if: always() # Ensure the report is posted even if the previous step failed (NO-GO)        
        uses: mshick/add-pr-comment@v2        
        with:          
          message-path: regression_report.md          
          repo-token: ${{ secrets.GITHUB_TOKEN }} 
                
      - name: Enforce GO/NO-GO Gate        
        if: failure()        
        run: |
          echo "::error::Evaluation pipeline detected a statistically significant regression  or inconclusive result. Merge is blocked."          
          exit 1

      - name: Update Telemetry Dashboard
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eval_pipeline/data/history.json
          git commit -m "chore: update eval telemetry" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref }}